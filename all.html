<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiters Section</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --text-muted: #6c757d;
            --bg-light: #f8f9fa;
        }

        .recruiter-section {
            padding: 80px 0;
            background-color: #fff;
        }

        .section-title {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            position: relative;
        }

        .section-subtitle {
            max-width: 800px;
            margin: 0 auto 3rem auto;
            color: var(--text-muted);
            line-height: 1.6;
        }

        /* Logo Grid Styling */
        .logo-item {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            height: 120px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            transition: all 0.3s ease-in-out;
            filter: grayscale(100%); /* Optional: Modern grayscale look */
            opacity: 0.7;
        }

        .logo-item:hover {
            filter: grayscale(0%);
            opacity: 1;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transform: translateY(-5px);
            border-color: #dee2e6;
        }

        .logo-item img {
            max-width: 100%;
            max-height: 60px;
            object-fit: contain;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .recruiter-section {
                padding: 50px 0;
            }
            .logo-item {
                height: 100px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

<section class="recruiter-section">
    <div class="container text-center">
        <div class="row mb-5">
            <div class="col-12">
                <h2 class="section-title">Our Top Recruiters</h2>
                <p class="section-subtitle">
                    Our institute is trusted by top brands and reputed organizations across industries. 
                    With strong academic support and skill-based learning, our students get opportunities 
                    to work with leading recruiters and build successful careers.
                </p>
            </div>
        </div>

        <div class="row g-4 justify-content-center">
            <div class="col-6 col-md-4 col-lg-2">
                <div class="logo-item">
                    <img src="images/bajaj-min.jpg" alt="Apollo Tyres">
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="logo-item">
                    <img src="images/amul-min.jpg" alt="Asian Paints">
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/4/43/Bajaj_Auto_logo.svg/1200px-Bajaj_Auto_logo.svg.png" alt="Bajaj">
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/ec/Berger_Paints_logo.svg" alt="Berger">
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b9/Blue_Dart_logo.svg" alt="Blue Dart">
                </div>
            </div>

            <div class="col-6 col-md-4 col-lg-2">
                <div class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/b/be/SpiceJet_logo.svg/1200px-SpiceJet_logo.svg.png" alt="SpiceJet">
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/en/thumb/2/23/Titan_Company_logo.svg/1200px-Titan_Company_logo.svg.png" alt="Titan">
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/RAK_Ceramics_logo.png" alt="RAK Ceramics">
                </div>
            </div>
            <div class="col-6 col-md-4 col-lg-2">
                <div class="logo-item">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/22/HDFC_Bank_Logo.svg" alt="HDFC">
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
