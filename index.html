<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Half-Screen Navbar</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
  
</head>
<body>

    <div class="header-wrapper" id="headerWrapper">
        <div class="top-info-bar">
            <div class="container">
                <div class="top-bar-content d-flex justify-content-between">
                    <div class="top-item">
                        <i class="fa-solid fa-phone-volume text-warning me-2"></i> HELP: <strong>+91-9236405978</strong>
                    </div>
                    <div class="top-item">
                        <i class="fa-solid fa-bell text-warning me-2"></i> ADMISSIONS OPEN 2026-27
                    </div>
                </div>
            </div>
        </div>

        <nav class="navbar navbar-expand-lg main-nav">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <img src="https://via.placeholder.com/150x150?text=LOGO" alt="Logo">
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
                    <i class="fa-solid fa-bars-staggered"></i>
                </button>

                <div class="collapse navbar-collapse justify-content-end">
                    <ul class="navbar-nav align-items-center">
                        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Courses</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Gallery</a></li>
                        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                        <li class="nav-item d-none d-lg-block">
                            <a href="#" class="btn-contact ms-3">Contact Us</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>

    <div class="offcanvas offcanvas-end" id="mobileSidebar">
        <div class="offcanvas-header">
            <h6 class="offcanvas-title fw-bold">CAMPUS MENU</h6>
            <button type="button" class="btn-close-custom" data-bs-dismiss="offcanvas">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        <div class="offcanvas-body">
            <div class="navbar-nav">
                <a class="nav-link" href="#"><i class="fa-solid fa-house me-2"></i> Home</a>
                <a class="nav-link" href="#"><i class="fa-solid fa-book me-2"></i> Courses</a>
                <a class="nav-link" href="#"><i class="fa-solid fa-user me-2"></i> About</a>
                <a class="nav-link" href="#"><i class="fa-solid fa-image me-2"></i> Gallery</a>
                <a class="nav-link" href="#"><i class="fa-solid fa-envelope me-2"></i> Contact</a>
            </div>
            <div class="p-4 mt-auto">
                <a href="#" class="btn-contact d-block text-center">Contact Us</a>
            </div>
        </div>
    </div>

    <section class="hero">
 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener('scroll', function() {
            const wrapper = document.getElementById('headerWrapper');
            if (window.scrollY > 50) {
                wrapper.classList.add('scrolled');
            } else {
                wrapper.classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
